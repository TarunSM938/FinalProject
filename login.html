<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log in — Scribble</title>
<link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="topbar">
    <a href="index.html" class="brand"><span class="pin-dot"></span>Scribble</a>
    <nav>
      <a href="index.html">Home</a>
    </nav>
  </header>

  <main class="auth-shell">
    <div class="auth-card">
      <div class="notebook-page">

        <div class="tab-row" id="tab-row">
          <button type="button" class="tab-btn active" data-tab="login">Log in</button>
          <button type="button" class="tab-btn" data-tab="signup">Sign up</button>
        </div>

        <div id="login-panel" class="tab-panel active">
          <h1>Welcome back</h1>
          <p class="sub">Log in with the email and password you signed up with.</p>

          <div class="form-msg" id="login-message"></div>

          <form id="login-form" novalidate>
            <div class="field">
              <label for="login-email">Email</label>
              <input type="email" id="login-email" name="email" placeholder="you@college.edu" autocomplete="email" />
            </div>
            <div class="field">
              <label for="login-password">Password</label>
              <input type="password" id="login-password" name="password" placeholder="Your password" autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:6px;">Log in</button>
          </form>
        </div>

        <div id="signup-panel" class="tab-panel">
          <h1>Create your account</h1>
          <p class="sub">Takes about ten seconds. Everything stays in your browser for this build.</p>

          <div class="form-msg" id="signup-message"></div>

          <form id="signup-form" novalidate>
            <div class="field">
              <label for="name">Full name</label>
              <input type="text" id="name" name="name" placeholder="Amara Osei" autocomplete="name" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" placeholder="you@college.edu" autocomplete="email" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="At least 6 characters" autocomplete="new-password" />
            </div>
            <div class="field">
              <label for="password-confirm">Confirm password</label>
              <input type="password" id="password-confirm" name="password-confirm" placeholder="Type it again" autocomplete="new-password" />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; margin-top:6px;">Sign up</button>
          </form>
        </div>

      </div>
    </div>
  </main>

  <script src="js/auth.js"></script>
</body>
</html>
